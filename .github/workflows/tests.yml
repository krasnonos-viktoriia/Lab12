name: Playwright UI Tests

on:
  push:
    branches:
      - main

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          playwright install --with-deps

      - name: Run tests with Allure
        run: |
          pytest tests/test_login_async.py tests/test_checkboxes_async.py tests/test_alerts_async.py tests/test_windows_attachment.py --alluredir=allure-results

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: screenshots/

      - name: Upload traces
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: traces
          path: traces/

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results/